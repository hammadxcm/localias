name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  binaries:
    name: Build ${{ matrix.artifact }}
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: localias-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: localias-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: localias-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: localias-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: localias-windows-x64.exe
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Compile binary
        run: bun build packages/cli/src/cli.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  github-release:
    name: GitHub Release
    needs: [release, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true
      - name: Get CLI version
        id: version
        run: echo "version=$(node -p "require('./packages/cli/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - name: Get CLI version
        id: version
        run: echo "version=$(node -p "require('./packages/cli/package.json').version")" >> "$GITHUB_OUTPUT"
        working-directory: ${{ github.workspace }}
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true
      - name: Compute SHA256 hashes
        id: sha
        run: |
          echo "darwin_arm64=$(shasum -a 256 artifacts/localias-darwin-arm64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "darwin_x64=$(shasum -a 256 artifacts/localias-darwin-x64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(shasum -a 256 artifacts/localias-linux-x64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(shasum -a 256 artifacts/localias-linux-arm64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_URL="https://github.com/hammadxcm/localias/releases/download/v${VERSION}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/hammadxcm/homebrew-localias.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/localias.rb << FORMULA
          class Localias < Formula
            desc "Stable .localhost URLs for every dev service"
            homepage "https://localias.fyniti.co.uk"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/localias-darwin-arm64"
                sha256 "${{ steps.sha.outputs.darwin_arm64 }}"
              else
                url "${BASE_URL}/localias-darwin-x64"
                sha256 "${{ steps.sha.outputs.darwin_x64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/localias-linux-arm64"
                sha256 "${{ steps.sha.outputs.linux_arm64 }}"
              else
                url "${BASE_URL}/localias-linux-x64"
                sha256 "${{ steps.sha.outputs.linux_x64 }}"
              end
            end

            def install
              bin.install Dir["localias*"].first => "localias"
            end

            test do
              assert_match "localias", shell_output("#{bin}/localias --help")
            end
          end
          FORMULA
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update localias to v${VERSION}" || exit 0
          git push
